name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ghcr.io/manubarrionuevo/platform-app

jobs:
  ci:
    if: github.actor != 'github-actions[bot]'
    name: 🚀 Build, Test and Publish
    runs-on: [self-hosted, linux, x64]

    defaults:
      run:
        working-directory: app

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v5

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: 📦 Install dependencies
        run: |
          echo "::group::npm ci"
          npm ci
          echo "::endgroup::"

      - name: 🧹 Run lint
        run: |
          echo "::group::eslint"
          npm run lint
          echo "::endgroup::"

      - name: 🧪 Run tests
        run: |
          echo "::group::jest"
          npm test
          echo "::endgroup::"

      - name: 🏷️ Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: 🔐 Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 🐳 Build Docker image
        run: |
          echo "::group::docker build"
          docker build \
            -t $IMAGE_NAME:${{ steps.vars.outputs.TAG }} \
            -t $IMAGE_NAME:latest .
          echo "::endgroup::"

      - name: 📤 Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "::group::docker push"
          docker push $IMAGE_NAME:${{ steps.vars.outputs.TAG }}
          docker push $IMAGE_NAME:latest
          echo "::endgroup::"

      - name: 📝 Update Helm values
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          echo "::group::update values.yaml"
          sed -i 's|repository: .*|repository: '"$IMAGE_NAME"'|' helm/platform-app/values.yaml
          sed -i 's|tag: .*|tag: "'"${{ steps.vars.outputs.TAG }}"'"|' helm/platform-app/values.yaml
          sed -i 's|pullPolicy: .*|pullPolicy: IfNotPresent|' helm/platform-app/values.yaml
          cat helm/platform-app/values.yaml
          echo "::endgroup::"

      - name: 📌 Commit updated Helm values
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/platform-app/values.yaml
          git diff --cached --quiet || git commit -m "ci: update platform-app image tag to ${{ steps.vars.outputs.TAG }}"

      - name: 🚀 Push updated Helm values
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: .
        run: |
          git push