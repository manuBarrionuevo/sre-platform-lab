replicaCount: 1

image:
  repository: platform-app
  tag: "1.0.0"
  pullPolicy: Never

service:
  type: ClusterIP
  port: 3000

containerPort: 3000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

serviceMonitor:
  enabled: false
  interval: 15s

app:
  env: dev