apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/manuBarrionuevo/sre-platform-lab.git
    targetRevision: main
    path: helm/platform-app

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true